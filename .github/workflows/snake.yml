name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # Executa todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente
  push:
    branches:
      - main # Roda também sempre que você atualizar o repositório

jobs:
  generate:
    permissions: 
      contents: write # 🔑 ESSENCIAL: Permite salvar os arquivos gerados no repositório
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: DouglasLira-Dev
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}